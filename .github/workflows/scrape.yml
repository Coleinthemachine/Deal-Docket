name: Daily sheriff sale scrape
on:
  schedule:
    - cron: "30 10 * * *"   # 10:30 UTC = 6:30 a.m. ET, daily
  workflow_dispatch: {}      # lets you run it manually from the Actions tab
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python sheriff_scraper.py --out properties.json
      - name: Commit updated data
        run: |
          git config user.name "docket-bot"
          git config user.email "actions@github.com"
          git add properties.json
          git diff --cached --quiet || git commit -m "Data refresh $(date -u +%F)"
          git push
